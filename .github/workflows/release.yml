# Release workflow — fires on v* tag push.
#
# Runs GoReleaser on macOS so the Darwin builds can be adhoc-codesigned with a
# proper bundle identifier (Go's default linker-sign stamps Identifier=a.out,
# which combined with com.apple.quarantine causes Gatekeeper to SIGKILL the
# binary with exit code 137 on end-user Macs).
#
# Optional secrets:
#   HOMEBREW_TAP_TOKEN — PAT with `contents: write` on
#     MikkoParkkola/homebrew-tap, enabling goreleaser's `brews` block to
#     auto-bump the formula. Without it, the brews step will fail; remove or
#     comment out the `brews:` block in .goreleaser.yaml if unavailable.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write  # cosign keyless signing via Sigstore needs OIDC token

jobs:
  goreleaser:
    runs-on: macos-14
    env:
      HAS_HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Must satisfy go.mod (>= 1.26.4 for stdlib CVE fixes); goreleaser
          # resolves the module path with GOTOOLCHAIN=local, so the runner's Go
          # itself has to be 1.26.4, not just the build toolchain.
          go-version: "1.26.4"

      # Install cosign for hybrid release signing — see signs: block in
      # .goreleaser.yaml. Keyless mode uses the workflow's OIDC token
      # against Sigstore's Fulcio, no extra secrets needed.
      #
      # Pin to v2.2.4: newer cosign versions (>=2.4.0) ship stricter bundle
      # parsing that rejects the older bundle format goreleaser-action's
      # own self-verification depends on, breaking the goreleaser download
      # step. v2.2.4 is the widely-deployed version used by goreleaser's
      # own release pipeline and is fully compatible with our signs: block.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.2.4'

      - name: Run GoReleaser with Homebrew tap
        if: env.HAS_HOMEBREW_TAP_TOKEN == 'true'
        # Pin to v6.4.0: goreleaser-action@v7 introduced a cosign-based
        # self-verification of the downloaded goreleaser binary, which is
        # incompatible with the new sigstore-bundle-v0.3 format goreleaser
        # ships in v2.4+ (the action passes --bundle to cosign without the
        # --new-bundle-format flag, so cosign rejects the bundle as
        # "does not contain cert"). v6.4.0 skips that pre-flight check;
        # our own signs: block in .goreleaser.yaml still uses the
        # cosign-installer cosign for signing release artifacts correctly.
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          # Docker is published by the Linux docker job below. Homebrew is
          # published here when HOMEBREW_TAP_TOKEN can push to the tap repo.
          args: release --clean --skip=docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Hybrid PQC signing: ML-DSA-65 private key. Pubkey is embedded
          # in trvl at build time from internal/selfupdate/keys/. Fingerprint
          # of the active trust anchor is shown by `trvl version --verify`.
          TRVL_MLDSA_PRIVKEY_V1: ${{ secrets.TRVL_MLDSA_PRIVKEY_V1 }}

      - name: Run GoReleaser without Homebrew tap
        if: env.HAS_HOMEBREW_TAP_TOKEN != 'true'
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=docker --skip=homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRVL_MLDSA_PRIVKEY_V1: ${{ secrets.TRVL_MLDSA_PRIVKEY_V1 }}

  docker:
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker buildx create --use --name trvl-release
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION="${VERSION}" \
            --tag "ghcr.io/mikkoparkkola/trvl:${VERSION}" \
            --tag "ghcr.io/mikkoparkkola/trvl:latest" \
            --file Dockerfile.release \
            --push \
            .

  mcp-registry:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Stamp server.json for release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "${VERSION}" '
            .version = $v |
            .packages[0].identifier = "ghcr.io/mikkoparkkola/trvl:" + $v |
            del(.packages[0].version)
          ' server.json > server.tmp
          mv server.tmp server.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  # Publishes the trvl-mcp npm wrapper via npm Trusted Publishing (OIDC) — no
  # stored token. One-time npmjs.com setup required: package trvl-mcp ->
  # Settings -> Trusted Publisher -> GitHub Actions, repo MikkoParkkola/trvl,
  # workflow release.yml, environment (none). Until that's configured this job
  # fails loudly, but the GitHub release itself is already published by the
  # goreleaser job above, so the release is not blocked.
  npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
      id-token: write  # OIDC token for npm trusted publishing + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # OIDC trusted publishing needs npm >= 11.5.1. Node 24 bundles a recent
      # npm; using setup-node avoids the permission error from globally
      # reinstalling npm on the runner.
      - name: Set up Node 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Stamp version from tag and publish (OIDC, no token)
        working-directory: npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          npm publish --provenance --access public

