version: 2

project_name: trvl

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test -short ./...
    # Sync npm/package.json version with the release tag before archives are
    # built. Previously lived under a top-level `after:` block which is not a
    # valid key in goreleaser v2 and made `goreleaser check` fail. Running it
    # in `before.hooks` is equivalent for our needs (version bump ships inside
    # the npm package when published; the Go binary version comes from
    # ldflags, not this file).
    - >-
        sh -c "cd npm && sed -i.bak 's/\"version\": \".*\"/\"version\": \"{{ .Version }}\"/' package.json && rm -f package.json.bak"

builds:
  - id: trvl
    main: ./cmd/trvl
    binary: trvl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}} -X github.com/MikkoParkkola/trvl/mcp.serverVersion={{.Version}}
    # Re-sign darwin binaries with a proper bundle identifier. Go's default
    # linker adhoc-sign stamps Identifier=a.out which Gatekeeper rejects with
    # SIGKILL (exit 137) once Homebrew applies com.apple.quarantine. This
    # replaces the identifier while keeping the adhoc (ad-hoc) signature — no
    # Apple Developer ID or notarization required. The hook only runs on
    # darwin artifacts because codesign is a darwin-only binary; Linux and
    # Windows build hosts never reach this path during `goreleaser release`
    # executed from macOS-14 runners.
    hooks:
      post:
        - cmd: sh -c 'if [ "{{ .Os }}" = "darwin" ]; then codesign -s - -i com.mikkoparkkola.trvl -f -o runtime "{{ .Path }}"; fi'

archives:
  - id: trvl
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# Hybrid quantum-safe release signing (NIST SP 800-208 transition pattern).
# Each archive is signed twice:
#
#   1. cosign keyless (ECDSA-P256 via Sigstore + GitHub OIDC). No persisted
#      signing key — Fulcio mints a short-lived cert tied to the workflow
#      identity at sign time. Defends against compromised release uploads
#      under classical cryptanalysis. Bundle file: <archive>.cosign.bundle.
#
#   2. ML-DSA-65 (NIST FIPS 204) via cmd/sign-mldsa. Long-lived keypair;
#      pubkey embedded in trvl at internal/selfupdate/keys/, privkey in
#      GH Secret TRVL_MLDSA_PRIVKEY_V1 with 1Password backup. Defends
#      against future quantum-cryptanalysis of layer 1. Sig file:
#      <archive>.mldsa65.sig.
#
# Verification (in trvl auto-update path): SHA-256 vs checksums.txt, then
# cosign verify-blob against the workflow identity, then ML-DSA verify
# against the embedded trust anchor. ALL THREE must pass before binary
# replacement. See internal/selfupdate/verify_mldsa.go for the verifier.
#
# Local snapshot builds (`goreleaser release --snapshot`) skip signs by
# default — only `goreleaser release` (tag-driven, in CI) runs them.
signs:
  - id: cosign-keyless
    cmd: cosign
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "--yes"
      - "${artifact}"
    artifacts: archive
    signature: "${artifact}.cosign.bundle"
    output: true
  - id: mldsa65
    cmd: go
    args:
      - "run"
      - "./cmd/sign-mldsa"
      - "--in"
      - "${artifact}"
      - "--out"
      - "${signature}"
    artifacts: archive
    signature: "${artifact}.mldsa65.sig"
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: MikkoParkkola
    name: trvl
  prerelease: auto
  draft: false
  name_template: "v{{ .Version }}"
  header: |
    ## trvl {{ .Version }}

    AI travel agent — 55 MCP tools for flights, hotels, ground transport, price alerts. Free, no API keys.

    ### Install

    ```bash
    # One-liner
    curl -fsSL https://github.com/MikkoParkkola/trvl/releases/download/v{{ .Version }}/trvl_{{ .Version }}_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz | tar xz -C /usr/local/bin trvl

    # Homebrew
    brew install MikkoParkkola/tap/trvl

    # Go
    go install github.com/MikkoParkkola/trvl/cmd/trvl@v{{ .Version }}
    ```

brews:
  - ids:
      - trvl
    repository:
      owner: MikkoParkkola
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/MikkoParkkola/trvl
    description: "AI travel agent: flights, hotels and transport via MCP, no API keys"
    license: "PolyForm-Noncommercial-1.0.0"
    install: |
      bin.install "trvl"
      system "xattr", "-dr", "com.apple.quarantine", "#{bin}/trvl" if OS.mac?
    test: |
      system "#{bin}/trvl", "version"

dockers:
  - image_templates:
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=trvl"
      - "--label=org.opencontainers.image.description=Google Flights + Hotels from your terminal"
      - "--label=org.opencontainers.image.url=https://github.com/MikkoParkkola/trvl"
      - "--label=org.opencontainers.image.source=https://github.com/MikkoParkkola/trvl"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=MIT"
  - image_templates:
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=trvl"
      - "--label=org.opencontainers.image.description=Google Flights + Hotels from your terminal"
      - "--label=org.opencontainers.image.url=https://github.com/MikkoParkkola/trvl"
      - "--label=org.opencontainers.image.source=https://github.com/MikkoParkkola/trvl"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=MIT"

# Note: the previous top-level `after.hooks` that bumped npm/package.json was
# moved into `before.hooks` at the top of this file. `after:` is not a valid
# goreleaser v2 key; retaining it made `goreleaser check` fail.

docker_manifests:
  - name_template: "ghcr.io/mikkoparkkola/trvl:{{ .Version }}"
    image_templates:
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-amd64"
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-arm64"
  - name_template: "ghcr.io/mikkoparkkola/trvl:latest"
    image_templates:
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-amd64"
      - "ghcr.io/mikkoparkkola/trvl:{{ .Version }}-arm64"
